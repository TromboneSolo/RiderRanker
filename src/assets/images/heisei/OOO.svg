<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#0a0800"/>
  <!-- Three medal/coin rings representing OOO's trifecta system -->
  <polygon points="150,30 270,95 270,225 150,290 30,225 30,95" fill="#2a1a00" stroke="#ffcc00" stroke-width="3"/>
  <circle cx="150" cy="120" r="22" fill="none" stroke="#cc0000" stroke-width="3" opacity="0.7"/>
  <circle cx="150" cy="160" r="22" fill="none" stroke="#ffcc00" stroke-width="3" opacity="0.7"/>
  <circle cx="150" cy="200" r="22" fill="none" stroke="#00aa44" stroke-width="3" opacity="0.7"/>
  <text x="150" y="205" font-family="Arial Black, Arial" font-size="110" fill="#ffcc00" text-anchor="middle" font-weight="900" opacity="0.08">O</text>
  <line x1="60" y1="320" x2="240" y2="320" stroke="#ffcc00" stroke-width="1" opacity="0.4"/>
  <text x="150" y="360" font-family="Arial Black, Arial" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="900" letter-spacing="8">OOO</text>
  <text x="150" y="385" font-family="Arial" font-size="12" fill="#ffcc00" text-anchor="middle" opacity="0.7" letter-spacing="3">HEISEI-12</text>
</svg>
