name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate config.js from secrets
        run: |
          cat > src/config.js << EOF
          // Auto-generated by CI — do not edit manually.
          export const APPS_SCRIPT_URL = "${{ secrets.APPS_SCRIPT_URL }}";
          export const APPS_SCRIPT_URL_RIDERS = "${{ secrets.APPS_SCRIPT_URL_RIDERS }}";
          export const SUBMISSION_SECRET = "${{ secrets.SUBMISSION_SECRET }}";
          EOF

      - name: Install dependencies
        run: npm install

      - name: Build
        run: NODE_OPTIONS=--openssl-legacy-provider react-scripts build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
