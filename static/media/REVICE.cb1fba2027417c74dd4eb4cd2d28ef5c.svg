<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <rect width="300" height="400" fill="#060010"/>
  <!-- Split red/blue demon design -->
  <polygon points="150,30 270,95 270,225 150,290 30,225 30,95" fill="#200000" stroke="#cc0000" stroke-width="3"/>
  <clipPath id="reviceRight">
    <polygon points="150,30 270,95 270,225 150,290"/>
  </clipPath>
  <polygon points="150,30 270,95 270,225 150,290 30,225 30,95" fill="#000020" clip-path="url(#reviceRight)"/>
  <line x1="150" y1="30" x2="150" y2="290" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Left side stamp motif -->
  <rect x="78" y="128" width="56" height="72" rx="4" fill="none" stroke="#cc0000" stroke-width="2" opacity="0.5"/>
  <text x="106" y="176" font-family="Arial Black, Arial" font-size="28" fill="#cc0000" text-anchor="middle" font-weight="900" opacity="0.5">V</text>
  <!-- Right side demon horn motif -->
  <line x1="174" y1="140" x2="164" y2="118" stroke="#0044cc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="194" y1="140" x2="204" y2="118" stroke="#0044cc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <ellipse cx="184" cy="170" rx="18" ry="22" fill="none" stroke="#0044cc" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="320" x2="240" y2="320" stroke="#cc0000" stroke-width="1" opacity="0.4"/>
  <text x="150" y="358" font-family="Arial Black, Arial" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="900" letter-spacing="3">REVICE</text>
  <text x="150" y="385" font-family="Arial" font-size="12" fill="#0044cc" text-anchor="middle" opacity="0.7" letter-spacing="3">REIWA-03</text>
</svg>
