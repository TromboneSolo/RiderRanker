<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="eyeL" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <radialGradient id="eyeR" cx="62%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <radialGradient id="helmetBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e3a10"/>
      <stop offset="100%" stop-color="#0a1408"/>
    </radialGradient>
  </defs>

  <!-- Helmet body -->
  <ellipse cx="32" cy="33" rx="27" ry="25" fill="url(#helmetBg)"/>
  <ellipse cx="32" cy="33" rx="27" ry="25" fill="none" stroke="#2e5a18" stroke-width="1.5"/>

  <!-- Helmet top crest ridge -->
  <path d="M 20 16 Q 32 10 44 16" stroke="#4a8028" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Left antenna -->
  <line x1="22" y1="15" x2="13" y2="4" stroke="#6aaa3a" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="13" cy="4" r="2.8" fill="#88cc44"/>

  <!-- Right antenna -->
  <line x1="42" y1="15" x2="51" y2="4" stroke="#6aaa3a" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="51" cy="4" r="2.8" fill="#88cc44"/>

  <!-- Left compound eye -->
  <ellipse cx="18" cy="32" rx="10" ry="8" fill="url(#eyeL)"/>
  <line x1="9"  y1="29" x2="27" y2="29" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="9"  y1="32" x2="27" y2="32" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="9"  y1="35" x2="27" y2="35" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="15" y1="24" x2="15" y2="40" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="18" y1="24" x2="18" y2="40" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="21" y1="24" x2="21" y2="40" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <ellipse cx="18" cy="32" rx="10" ry="8" fill="none" stroke="#cc2222" stroke-width="1"/>

  <!-- Right compound eye -->
  <ellipse cx="46" cy="32" rx="10" ry="8" fill="url(#eyeR)"/>
  <line x1="37" y1="29" x2="55" y2="29" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="37" y1="32" x2="55" y2="32" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="37" y1="35" x2="55" y2="35" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="43" y1="24" x2="43" y2="40" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="46" y1="24" x2="46" y2="40" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <line x1="49" y1="24" x2="49" y2="40" stroke="#ff8888" stroke-width="0.6" opacity="0.45"/>
  <ellipse cx="46" cy="32" rx="10" ry="8" fill="none" stroke="#cc2222" stroke-width="1"/>

  <!-- Central nose/faceplate diamond -->
  <path d="M 28 30 L 32 25 L 36 30 L 32 36 Z" fill="#081008" stroke="#3a6820" stroke-width="1"/>

  <!-- Lower face bar -->
  <path d="M 12 42 Q 32 48 52 42" stroke="#2e5a18" stroke-width="2" fill="#0d1f09"/>

  <!-- Muffler / scarf — iconic white -->
  <path d="M 15 56 Q 32 63 49 56" stroke="#e8e8e8" stroke-width="4.5" fill="none" stroke-linecap="round"/>
</svg>
